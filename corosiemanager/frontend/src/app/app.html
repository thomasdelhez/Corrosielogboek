@if (isLoginRoute()) {
  <router-outlet />
} @else {
  <div class="app-main">
    <header class="app-topbar">
      <a class="brand" routerLink="/">
        <span class="brand-mark">CL</span>
        <div>
          <p class="eyebrow">Maintenance Workspace</p>
          <strong>Corrosiemanager</strong>
        </div>
      </a>

      <div class="topbar-actions">
        @if (currentUser(); as user) {
          <a class="account-chip" routerLink="/account">
            <span>{{ user.username }}</span>
            <small>{{ user.roles[0] }}</small>
          </a>
          <button class="logout-btn" type="button" (click)="logout()">Uitloggen</button>
        }
      </div>
    </header>

    <main class="app-content">
      <router-outlet />
    </main>
  </div>
}
<app-toast-host />
