    <header class="page-header">
      <div class="copy">
        @if (eyebrow()) {
          <p class="eyebrow">{{ eyebrow() }}</p>
        }
        <div class="heading-row">
          @if (backLink() && backPlacement() === 'left') {
            <a class="back-link" [routerLink]="backLink()!" [queryParams]="backQueryParams()">{{ backLabel() }}</a>
          }
          <div>
            <h1>{{ title() }}</h1>
            @if (subtitle()) {
              <p class="subtitle">{{ subtitle() }}</p>
            }
          </div>
        </div>
      </div>
      <div class="actions">
        @if (backLink() && backPlacement() === 'right') {
          <a class="back-link" [routerLink]="backLink()!" [queryParams]="backQueryParams()">{{ backLabel() }}</a>
        }
        <ng-content />
      </div>
    </header>
