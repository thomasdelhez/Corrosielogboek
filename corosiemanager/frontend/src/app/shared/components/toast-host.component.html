    <section class="toast-stack" aria-live="polite" aria-atomic="true">
      @for (toast of toastService.toasts(); track toast.id) {
        <article class="toast" [class.success]="toast.type === 'success'" [class.error]="toast.type === 'error'" [class.info]="toast.type === 'info'">
          <p>{{ toast.text }}</p>
          <button type="button" (click)="toastService.dismiss(toast.id)" aria-label="Sluiten">×</button>
        </article>
      }
    </section>
